<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Parágrafos e Quebras de linha</h1>
    <hr>
    <p>E possivel &lt;escrever&gt; um parágrafo de qualquer maneira. basta inserir o texto entre &lt;p&gt; e &lt;/p&gt; </p>
    <!--LESS THAN / Great THAN-->
    <p>Se eu precisar de fazer uma quebra do texto num <br> determinado lugar, então temos que usar a tag br.</p>
    <p>Vamos adicionar alguns simbolos especiais:
    &reg;
    &copy;
    &trade;
    &euro;
    &pound;
    &yen;
    &cent;
    &delta;
    </p>
</body>
</html>
